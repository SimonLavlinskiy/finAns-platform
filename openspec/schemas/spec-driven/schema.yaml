name: spec-driven
version: 1
description: >
  OpenSpec для finAn — proposal → specs → design → tasks (per stack) → test cases.
  Apply по стеку backend|frontend|design. Монорепозиторий Go + React.
artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.

      Sections:
      - **Title**: One line summary for PR subject.
      - **Why**: 1-2 sentences on the problem or opportunity.
      - **What Changes**: Bullet list; mark breaking changes **BREAKING**.
      - **Capabilities**: New (kebab-case → `specs/<name>/spec.md`) and Modified (delta specs).
      - **Impact**: Affected services under `workspace/<service>/`, APIs, migrations.

      Capabilities create the contract for specs and tasks.
      Use stable kebab-case ids — they appear in `tasks_*.md` as `<!-- spec: id -->`.

      Keep concise (1-2 pages). Implementation details → design.md.
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: Detailed specifications for the change
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      One spec file per capability from proposal Capabilities.
      - New: `specs/<capability>/spec.md`
      - Modified: delta at `specs/<capability>/spec.md` from `openspec/specs/<capability>/`

      Delta operations (## headers): ADDED, MODIFIED (full blocks), REMOVED (Reason + Migration), RENAMED (FROM:/TO:).

      Format:
      - `### Requirement: <name>` — SHALL/MUST
      - `#### Scenario: <name>` — WHEN/THEN (exactly 4 hashtags)
      - Every requirement MUST have at least one scenario.

      Specs should be testable — scenarios feed test_case.md.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      Create the design document explaining HOW to implement the change.

      Sections: Context, Goals / Non-Goals, Decisions (with alternatives), Risks / Trade-offs,
      Migration Plan, Open Questions.

      Reference proposal (why) and specs (what). Paths: `workspace/finAns-backend/`, `workspace/finAns-frontend/`.
    requires:
      - proposal

  - id: tasks-backend
    generates: tasks_backend.md
    description: Backend implementation checklist (Go, PostgreSQL, API)
    template: tasks_backend.md
    instruction: |
      Create tasks_backend.md — backend only (Go, PostgreSQL, REST API).

      **Follow template exactly.** Apply parses `- [ ]` / `- [x]`.

      - ## numbered headings; after each: `<!-- spec: <capability-id> -->`
      - Each task: `- [ ] N.M Description` (N.M required); ≤2 hours
      - Paths: `workspace/finAns-backend/...`
      - No React/TypeScript tasks here — use tasks_frontend.md
    requires:
      - specs
      - design

  - id: tasks-frontend
    generates: tasks_frontend.md
    description: Frontend implementation checklist (React, TypeScript)
    template: tasks_frontend.md
    instruction: |
      Create tasks_frontend.md — frontend only (React/TypeScript, Vite).

      Same checkbox rules as tasks_backend.md.
      Order after backend API contracts when applicable.
    requires:
      - specs
      - design

  - id: tasks-design
    generates: tasks_design.md
    description: Design checklist (screens, components, flows, assets)
    template: tasks_design.md
    instruction: |
      Create tasks_design.md — design only (экраны, компоненты, flow, ассеты).

      Структура файла (следуй шаблону строго):
      1. **Описание изменений** — что меняется для пользователя.
      2. **Текущий флоу** — шаги СЕЙЧАС (или «Отсутствует»).
      3. **Новый флоу** — шаги ПОСЛЕ изменения.
      4. **Задачи** — чеклист `- [ ] N.M` ≤2 часа; после ## heading: `<!-- spec: capability-id -->`.
    requires:
      - specs

  - id: test-cases
    generates: test_case.md
    description: QA test cases derived from spec scenarios
    template: test_case.md
    instruction: |
      Create test_case.md for QA — scenarios from specs and design.

      - ## per test area; `<!-- spec: capability-id -->`
      - ### TC-XX with table (Приоритет, Тип, Спека → Scenario, Шаги, Ожидаемый результат, Статус ☐)
      - Cover every #### Scenario; add negative/boundary cases
      - Language: Russian
    requires:
      - specs
      - design

apply:
  requires:
    - tasks-backend
    - tasks-frontend
    - tasks-design
  tracks: null
  instruction: |
    SPEC-DRIVEN APPLY — agent runs all shell; user does NOT use terminal.

    PRECHECK:
    - Spec-review merged to main (if team workflow applies).
    - `make verify` — workspace clones present.
    - Artifacts complete for selected stack.

    1. **Stack** — ask or infer: `backend` | `frontend` | `design`.

    2. **Branches `features/<change-name>`** (agent runs in platform repo + each touched `workspace/<service>/`):
       `git fetch && git checkout -B features/<change-name>`

    3. **Tasks file** — work ONLY `tasks_<stack>.md` from
       `openspec instructions apply --change <name> --json`.
       Mark `- [x]` when done. Code only under `workspace/` per AGENTS.md.

    4. **When stack tasks complete** — commit, push, open PR (platform + service repos).

    5. **Archive** — `/opsx:archive` after all stacks merged.
